<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="server-name">Family Chat</div>
            <div class="channel"># general</div>
            <div class="channel active"># random</div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header"># random</header>
            <div class="messages" id="chatOutput">
                <div class="message"><b>Uncle Bob:</b> Yo, what's good?</div>
                <div class="message"><b>You:</b> Just coding this app, bro!</div>
            </div>
            <form id="chatForm" class="input-area">
                <input type="text" id="userInput" placeholder="Message #random..." required>
                <button type="submit">Send</button>
            </form>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
